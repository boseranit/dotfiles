set -g default-terminal "tmux-256color"
set -g history-limit 100000
set -g mouse on
set -g set-clipboard on

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

# Seamless navigation and resizing between tmux panes and Neovim splits.
# Detect the foreground command directly because @pane-is-vim can remain set
# after Neovim is killed. Keep passing C-h/j/k/l to fzf for list navigation.
set-option -g @is-vim '#{m/r:^n?vim$,#{pane_current_command}}'
set-option -g @is-vim-or-fzf '#{m/r:^(n?vim|fzf)$,#{pane_current_command}}'

bind-key -n 'C-h' if-shell -F '#{E:@is-vim-or-fzf}' 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell -F '#{E:@is-vim-or-fzf}' 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell -F '#{E:@is-vim-or-fzf}' 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell -F '#{E:@is-vim-or-fzf}' 'send-keys C-l' 'select-pane -R'

bind-key -n 'M-h' if-shell -F '#{E:@is-vim}' 'send-keys M-h' 'resize-pane -L 3'
bind-key -n 'M-j' if-shell -F '#{E:@is-vim}' 'send-keys M-j' 'resize-pane -D 3'
bind-key -n 'M-k' if-shell -F '#{E:@is-vim}' 'send-keys M-k' 'resize-pane -U 3'
bind-key -n 'M-l' if-shell -F '#{E:@is-vim}' 'send-keys M-l' 'resize-pane -R 3'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# C-l is now navigation; keep terminal clear-screen available behind prefix.
bind-key 'C-l' send-keys 'C-l'

# Switch to the last session by pressing the prefix twice.
bind-key 'C-b' switch-client -l
bind-key 'B' send-prefix

# Holding Ctrl while pressing prefix + z should zoom, not suspend the client.
bind-key -T prefix 'C-z' resize-pane -Z

# Split panes with prefix | and -, keeping the current directory.
bind-key '|' split-window -h -c '#{pane_current_path}'
bind-key '-' split-window -v -c '#{pane_current_path}'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

run-shell ~/.config/tmux/plugins/tpm/tpm
